<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filmek</title>
</head>
<body>

  <div class="container">
    <h1>Filmek</h1>

    <div>
      <button type="submit" class="btn btn-primary mb-3" id="addButton">Hozzáadás</button>
    </div>

    <table class="table table-striped table-success">
      <thead>
        <tr>
          <th>Id</th>
          <th>Cím</th>
          <th>Rendező</th>
          <th>Kiadás éve</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>

  </div>
    
  <div id="modalbox" class="d-none">

      <div class="modal fade" tabindex="-1">
          <div class="modal-dialog">
              <div class="modal-content">

                  <div class="modal-header">
                      <h1 class="modal-title fs-5">Film hozzáadása</h1>
                      <button
                          type="button"
                          class="btn-close closeButton"
                          aria-label="Close">
                      </button>
                  </div>

                  <form id="movieForm">
                      <div class="modal-body">

                          <div class="mb-3">
                              <label for="title" class="form-label">Cím</label>
                              <input
                                  type="text"
                                  class="form-control"
                                  id="title"
                                  name="title">
                          </div>

                          <div class="mb-3">
                              <label for="director" class="form-label">Rendező</label>
                              <input
                                  type="text"
                                  class="form-control"
                                  id="director"
                                  name="director">
                          </div>

                          <div class="mb-3">
                              <label for="releaseYear" class="form-label">Kiadás éve</label>
                              <input
                                  type="number"
                                  class="form-control"
                                  id="releaseYear"
                                  name="releaseYear">
                          </div>

                      </div>

                      <div class="modal-footer">
                          <button
                              type="button"
                              class="btn btn-secondary closeButton">
                              Bezárás
                          </button>

                          <button
                              type="submit"
                              class="btn btn-primary">
                              Mentés
                          </button>
                      </div>
                  </form>

              </div>
          </div>
      </div>

      <div class="modal-backdrop fade" id="modal-backdrop"></div>

  </div>

    <div class="modal-backdrop fade" id="modal-backdrop"></div>
  </div>

    <script type="module" src="src/movies.js"></script>
</body>
</html>
